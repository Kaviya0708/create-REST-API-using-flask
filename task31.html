<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST API Demo</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            margin-top:50px;
        }
        button{
            padding:10px 20px;
            font-size:16px;
            cursor:pointer;
        }
        #output{
            margin-top:20px;
            font-size:18px;
            color:green;
        }
    </style>
</head>
<body>

    <h1>REST API Demo</h1>

    <button onclick="fetchData()">Get Data</button>

    <div id="output">Click the button to fetch data.</div>

    <script>
        function fetchData() {
            fetch('https://jsonplaceholder.typicode.com/posts/1')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('output').innerHTML =
                        "<h3>" + data.title + "</h3>" +
                        "<p>" + data.body + "</p>";
                })
                .catch(error => {
                    document.getElementById('output').innerHTML =
                        "Error fetching data!";
                    console.error(error);
                });
        }
    </script>

</body>
</html>
